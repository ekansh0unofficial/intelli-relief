version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: intelli-relief-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-intelli_relief}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-intelli_relief_dev_2026}
      POSTGRES_DB: ${POSTGRES_DB:-intelli_relief_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - intelli-relief-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intelli_relief"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: intelli-relief-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - intelli-relief-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: intelli-relief-backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-intelli_relief}:${POSTGRES_PASSWORD:-intelli_relief_dev_2026}@postgres:5432/${POSTGRES_DB:-intelli_relief_db}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      ENVIRONMENT: ${ENVIRONMENT:-development}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/tests:/app/tests
      - ./logs/backend:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - intelli-relief-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend (React + Vite)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: intelli-relief-frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api}
      VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8000/ws}
      VITE_MAPBOX_TOKEN: ${VITE_MAPBOX_TOKEN:-}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - intelli-relief-network
    command: npm run dev

  # Nginx Reverse Proxy (Production-like setup)
  nginx:
    image: nginx:alpine
    container_name: intelli-relief-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - intelli-relief-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  intelli-relief-network:
    driver: bridge